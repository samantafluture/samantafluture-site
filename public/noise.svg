<svg width="40" height="40" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="crosshatch" width="20" height="20" patternUnits="userSpaceOnUse" patternTransform="rotate(0)">
      <line x1="0" y1="0" x2="20" y2="20" stroke="#ffffff" stroke-width="0.5" opacity="0.05"/>
      <line x1="20" y1="0" x2="0" y2="20" stroke="#ffffff" stroke-width="0.5" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#crosshatch)"/>
</svg>
