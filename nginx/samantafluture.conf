server {
    listen 80;
    server_name samantafluture.com www.samantafluture.com;
    return 301 https://samantafluture.com$request_uri;
}

server {
    listen 443 ssl;
    server_name www.samantafluture.com;

    ssl_certificate     /etc/letsencrypt/live/samantafluture.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/samantafluture.com/privkey.pem;

    return 301 https://samantafluture.com$request_uri;
}

server {
    listen 443 ssl;
    server_name samantafluture.com;

    ssl_certificate     /etc/letsencrypt/live/samantafluture.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/samantafluture.com/privkey.pem;

    root /usr/share/nginx/samantafluture;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Cache static assets aggressively
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache fonts
    location /fonts/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Favicon + static files
    location ~* \.(svg|ico|png|jpg|jpeg|gif|webp|woff2|woff)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # Static site — try file, then directory index, then 404
    location / {
        try_files $uri $uri/index.html =404;
    }

    # Disable access to hidden files
    location ~ /\. {
        deny all;
    }
}
